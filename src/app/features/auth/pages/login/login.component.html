<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center p-4">
  <!-- Login Card -->
  <div class="w-full max-w-[440px] bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8 md:p-12 transition-all duration-300 border border-slate-100 dark:border-slate-700">
    
    <!-- Logo -->
    <div class="flex justify-center mb-8">
      <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center cursor-pointer overflow-hidden">
         <img src="assets/images/logo.png" alt="Logo" class="w-full h-full object-cover">
      </div>
    </div>

    <!-- Header -->
    <div class="text-center space-y-2 mb-10">
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Welcome Back</h1>
      <p class="text-slate-500 dark:text-slate-400 font-medium">Sign in to your account to continue</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="space-y-2">
        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Username</label>
        <div class="relative group">
          <input 
            type="text" 
            formControlName="username"
            placeholder="Enter your username"
            class="w-full bg-slate-50 dark:bg-slate-700/50 border-0 focus:ring-2 focus:ring-primary-500 rounded-2xl px-5 py-4 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all outline-none"
          >
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Password</label>
        <div class="relative group">
          <input 
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            class="w-full bg-slate-50 dark:bg-slate-700/50 border-0 focus:ring-2 focus:ring-primary-500 rounded-2xl px-5 py-4 pr-12 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all outline-none"
          >
          <button 
            type="button" 
            (click)="togglePasswordVisibility()" 
            class="absolute inset-y-0 right-4 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
          >
            <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage()" class="flex items-center gap-2 bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800/50 text-red-600 dark:text-red-400 rounded-2xl px-4 py-3 text-sm font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 flex-shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        {{ errorMessage() }}
      </div>

      <!-- Sign In Button -->
      <button 
        type="submit"
        [disabled]="isLoading() || loginForm.invalid"
        class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary-500/30 transform hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-4"
      >
        <span *ngIf="!isLoading()">Sign In</span>
        <span *ngIf="isLoading()" class="flex items-center justify-center">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Processing...
        </span>
      </button>
    </form>

    <!-- Footer Links -->
    <div class="mt-8 text-center space-y-4">
      <a href="javascript:void(0)" class="text-sm font-semibold text-primary-600 hover:text-primary-500 transition-colors">Forgot password?</a>
      <p class="text-sm font-medium text-slate-500 dark:text-slate-400">
        Don't have an account? 
        <a routerLink="/auth/register" class="text-primary-600 hover:text-primary-500 font-bold ml-1 transition-colors">Sign up</a>
      </p>
    </div>
  </div>
</div>
